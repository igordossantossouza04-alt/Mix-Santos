<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Mix Santos</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{

background:#d40000;

color:white;

padding:20px;

font-size:32px;

text-align:center;

font-weight:bold;

}

.container{

padding:15px;

}

.card{

background:white;

padding:15px;

margin-bottom:15px;

border-radius:15px;

box-shadow:
0 2px 10px
rgba(0,0,0,.1);

}

button{

width:100%;

padding:15px;

border:none;

border-radius:10px;

background:#1db954;

color:white;

font-size:18px;

}

input{

width:100%;

padding:12px;

margin-bottom:10px;

box-sizing:border-box;

}

.total{

font-size:24px;

font-weight:bold;

}

</style>

</head>

<body>

<header>

MIX SANTOS

</header>

<div class="container">

<div class="card">

<h3>🍚 Arroz 5kg</h3>

R$ 25

<br><br>

<button onclick="add('Arroz',25)">

Adicionar

</button>

</div>

<div class="card">

<h3>☕ Café</h3>

R$ 18

<br><br>

<button onclick="add('Café',18)">

Adicionar

</button>

</div>

<div class="card">

<h3>🫘 Feijão</h3>

R$ 10

<br><br>

<button onclick="add('Feijão',10)">

Adicionar

</button>

</div>

<div class="card">

<input
id="nome"
placeholder="Nome">

<input
id="endereco"
placeholder="Endereço">

<div class="total">

Total:
R$

<span id="total">

0

</span>

</div>

<br>

<button onclick="enviar()">

🛒 PEDIR

</button>

</div>

</div>

<script>

let itens=[]

let total=0

function add(nome,valor){

itens.push(nome)

total+=valor

document
.getElementById(
"total"
)
.innerHTML=
total

}

function enviar(){

if(
itens.length===0
){

alert(
"Adicione um produto"
)

return

}

let nome=

document
.getElementById(
"nome"
)
.value

let endereco=

document
.getElementById(
"endereco"
)
.value

let texto=

"🛒 MIX SANTOS\n\n"+
"Cliente: "+
nome+
"\n\n"+
"Endereço: "+
endereco+
"\n\n"+
"Produtos: "+
itens.join(", ")+
"\n\n"+
"Total: R$ "+
total

let url=

"https://api.whatsapp.com/send?phone=5577991611104&text="+
encodeURIComponent(texto)

window.open(
url,
"_blank"
)

}

</script>

</body>

</html>
